<!--
Three-body_motion_simulation
三体运行模拟 —— 王泰然
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>三体运动模拟模型</title>
  <style>
    :root {
      --bg: #0b0b16;
      --panel-bg: rgba(16, 16, 30, 0.92);
      --text: #e0e0f0;
      --text-secondary: #a0a0b8;
      --accent: #ffb347;
      --border: rgba(255, 255, 255, 0.12);
      --radius: 14px;
      --transition: 0.25s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      display: flex; height:100vh; width:100vw; overflow:hidden; color:var(--text);
    }
    #panel {
      width: 330px; min-width:330px; background:var(--panel-bg); border-right:1px solid var(--border);
      display:flex; flex-direction:column; padding:16px 14px; gap:12px; overflow-y:auto;
      backdrop-filter: blur(12px); z-index:5; box-shadow:2px 0 20px rgba(0,0,0,0.4);
    }
    #panel h2 { font-size:1.25rem; font-weight:700; letter-spacing:0.03em; color:#fff; text-align:center; margin-bottom:2px; }
    
    /* 介绍窗口 */
    .intro-box {
      background: linear-gradient(135deg, rgba(255,179,71,0.12), rgba(94,184,247,0.08));
      border: 1px solid rgba(255,179,71,0.3);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.78rem;
      line-height: 1.5;
      color: #d0d0e0;
      text-align: center;
    }
    .intro-box .highlight {
      color: var(--accent);
      font-weight: 600;
    }

    .body-params {
      background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:var(--radius);
      padding:10px 12px; display:flex; flex-direction:column; gap:5px;
    }
    .body-params h3 { font-size:0.9rem; margin-bottom:2px; display:flex; align-items:center; gap:6px; }
    .color-dot { display:inline-block; width:10px; height:10px; border-radius:50%; }
    .param-row { display:flex; align-items:center; gap:6px; font-size:0.78rem; }
    .param-row label { width:32px; color:var(--text-secondary); text-align:right; flex-shrink:0; }
    .param-row input {
      flex:1; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:6px;
      padding:4px 6px; color:#fff; font-size:0.78rem; font-family:inherit; outline:none;
      transition:var(--transition); min-width:0;
    }
    .param-row input:focus { border-color:var(--accent); background:rgba(255,179,71,0.08); }
    .control-row { display:flex; align-items:center; gap:8px; font-size:0.8rem; flex-wrap:wrap; }
    .control-row button {
      background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text);
      border-radius:8px; padding:6px 12px; cursor:pointer; font-size:0.8rem; transition:var(--transition);
    }
    .control-row button:hover { background:rgba(255,255,255,0.15); }
    #apply-btn {
      background:var(--accent); color:#1a1a1a; font-weight:700; border:none;
      border-radius:24px; padding:10px; font-size:0.9rem; cursor:pointer; transition:var(--transition);
      letter-spacing:0.04em;
    }
    #apply-btn:hover { background:#ffc163; }
    .speed-slider {
      flex:1; -webkit-appearance:none; height:6px; background:rgba(255,255,255,0.2);
      border-radius:3px; outline:none; min-width:60px;
    }
    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance:none; width:20px; height:20px; background:var(--accent);
      border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow:0 0 8px rgba(255,179,71,0.5);
    }
    .speed-slider::-moz-range-thumb {
      width:20px; height:20px; background:var(--accent); border-radius:50%;
      cursor:pointer; border:2px solid #fff; box-shadow:0 0 8px rgba(255,179,71,0.5);
    }
    .note { font-size:0.65rem; color:#666; text-align:center; margin-top:4px; }
    #canvas-container { flex:1; position:relative; overflow:hidden; }
    canvas { display:block; width:100%; height:100%; }
    @media (max-width:700px) {
      body { flex-direction:column; }
      #panel { width:100%; min-width:100%; max-height:48vh; flex-shrink:0; border-right:none; border-bottom:1px solid var(--border); }
      #canvas-container { flex:1; }
    }
  </style>
</head>
<body>
  <div id="panel">
    <h2>⚙️ 自定义三体参数</h2>
    
    <!-- 介绍窗口 -->
    <div class="intro-box">
      ✨ 该网页由<span class="highlight">大D老师（Deepseek）</span>帮助完成<br>
      使用者可以修改三体的参数进行模拟运行<br>
      <span style="font-size:0.7rem; opacity:0.7;">（虽然结果极有可能是混沌解法）</span>
    </div>

    <!-- 天体 A -->
    <div class="body-params">
      <h3><span class="color-dot" style="background:#ffb347;"></span> 天体 A</h3>
      <div class="param-row"><label>质量</label><input type="number" id="m1" value="1.0" step="0.1" min="0.0001" max="5000"></div>
      <div class="param-row"><label>X</label><input type="number" id="x1" value="1.0" step="0.001"></div>
      <div class="param-row"><label>Y</label><input type="number" id="y1" value="0.0" step="0.001"></div>
      <div class="param-row"><label>Vx</label><input type="number" id="vx1" value="0.0" step="0.001"></div>
      <div class="param-row"><label>Vy</label><input type="number" id="vy1" value="0.7598357" step="0.001"></div>
    </div>

    <!-- 天体 B -->
    <div class="body-params">
      <h3><span class="color-dot" style="background:#66ccff;"></span> 天体 B</h3>
      <div class="param-row"><label>质量</label><input type="number" id="m2" value="1.0" step="0.1" min="0.0001" max="5000"></div>
      <div class="param-row"><label>X</label><input type="number" id="x2" value="-0.5" step="0.001"></div>
      <div class="param-row"><label>Y</label><input type="number" id="y2" value="0.866025" step="0.001"></div>
      <div class="param-row"><label>Vx</label><input type="number" id="vx2" value="-0.657906" step="0.001"></div>
      <div class="param-row"><label>Vy</label><input type="number" id="vy2" value="-0.379918" step="0.001"></div>
    </div>

    <!-- 天体 C -->
    <div class="body-params">
      <h3><span class="color-dot" style="background:#ff6b8a;"></span> 天体 C</h3>
      <div class="param-row"><label>质量</label><input type="number" id="m3" value="1.0" step="0.1" min="0.0001" max="5000"></div>
      <div class="param-row"><label>X</label><input type="number" id="x3" value="-0.5" step="0.001"></div>
      <div class="param-row"><label>Y</label><input type="number" id="y3" value="-0.866025" step="0.001"></div>
      <div class="param-row"><label>Vx</label><input type="number" id="vx3" value="0.657906" step="0.001"></div>
      <div class="param-row"><label>Vy</label><input type="number" id="vy3" value="-0.379918" step="0.001"></div>
    </div>

    <button id="apply-btn">应用参数并重置</button>
    <div class="control-row">
      <button id="pause-btn">⏯️ 暂停</button>
      <button id="reset-btn">↺ 重置</button>
      <button id="trail-btn">✨ 轨迹</button>
    </div>
    <div class="control-row">
      <span style="font-size:0.75rem;">速度</span>
      <input type="range" id="speed-slider" class="speed-slider" min="1" max="20" value="4" step="1">
      <span id="speed-label" style="min-width:30px;">4×</span>
    </div>
    <div class="note">🖱️ 滚轮缩放 | 拖拽平移 | 空格暂停 | R重置 | T切换轨迹</div>
    <div class="note">输入参数时，键盘快捷键自动屏蔽</div>
  </div>

  <div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
  </div>

  <script>
    (function() {
      // DOM 元素
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      const applyBtn = document.getElementById('apply-btn');
      const pauseBtn = document.getElementById('pause-btn');
      const resetBtn = document.getElementById('reset-btn');
      const trailBtn = document.getElementById('trail-btn');
      const speedSlider = document.getElementById('speed-slider');
      const speedLabel = document.getElementById('speed-label');
      const canvasContainer = document.getElementById('canvas-container');
      const inputs = {
        m1: document.getElementById('m1'), x1: document.getElementById('x1'), y1: document.getElementById('y1'),
        vx1: document.getElementById('vx1'), vy1: document.getElementById('vy1'),
        m2: document.getElementById('m2'), x2: document.getElementById('x2'), y2: document.getElementById('y2'),
        vx2: document.getElementById('vx2'), vy2: document.getElementById('vy2'),
        m3: document.getElementById('m3'), x3: document.getElementById('x3'), y3: document.getElementById('y3'),
        vx3: document.getElementById('vx3'), vy3: document.getElementById('vy3'),
      };

      // 提高精度的物理常量
      const G = 1.0;
      const SOFTENING = 1e-6;
      const MAX_TRAIL = 1500;
      const BASE_DT = 0.001;
      const SUBSTEPS_PER_BASE = 8;

      // 状态变量
      let bodies = [];
      let trails = [[],[],[]];
      let simTime = 0;
      let paused = false;
      let showTrails = true;
      let simSpeed = 4;
      let accumulator = 0;

      // 视图（世界坐标 -> 屏幕坐标）
      let viewScale = 160;         // 每单位长度对应像素数
      let viewOffsetX = 0;        // 世界原点在屏幕上的偏移（像素）
      let viewOffsetY = 0;
      let targetViewScale = 160;
      let targetViewOffsetX = 0;
      let targetViewOffsetY = 0;
      let isDragging = false;
      let dragStartX, dragStartY, dragStartOffX, dragStartOffY;
      let stars = [];

      class Body {
        constructor(mass, x, y, vx, vy, color) {
          this.mass = mass; this.x = x; this.y = y; this.vx = vx; this.vy = vy;
          this.ax = 0; this.ay = 0; this.color = color;
        }
      }

      function computeAccelerations(bs) {
        for(let b of bs) { b.ax=0; b.ay=0; }
        for(let i=0;i<bs.length;i++) {
          for(let j=i+1;j<bs.length;j++) {
            const bi=bs[i], bj=bs[j];
            const dx=bj.x-bi.x, dy=bj.y-bi.y;
            const distSq=dx*dx+dy*dy+SOFTENING;
            const invDist3=1.0/(distSq*Math.sqrt(distSq));
            const fx=G*dx*invDist3, fy=G*dy*invDist3;
            bi.ax+=bj.mass*fx; bi.ay+=bj.mass*fy;
            bj.ax-=bi.mass*fx; bj.ay-=bi.mass*fy;
          }
        }
      }

      function rk4Step(bs, dt) {
        const n=bs.length;
        const orig=bs.map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy}));
        function getDerivs(arr){ computeAccelerations(arr); return arr.map(b=>({dx:b.vx,dy:b.vy,dvx:b.ax,dvy:b.ay})); }
        const k1=getDerivs(bs);
        for(let i=0;i<n;i++){
          bs[i].x=orig[i].x+0.5*dt*k1[i].dx; bs[i].y=orig[i].y+0.5*dt*k1[i].dy;
          bs[i].vx=orig[i].vx+0.5*dt*k1[i].dvx; bs[i].vy=orig[i].vy+0.5*dt*k1[i].dvy;
        }
        const k2=getDerivs(bs);
        for(let i=0;i<n;i++){
          bs[i].x=orig[i].x+0.5*dt*k2[i].dx; bs[i].y=orig[i].y+0.5*dt*k2[i].dy;
          bs[i].vx=orig[i].vx+0.5*dt*k2[i].dvx; bs[i].vy=orig[i].vy+0.5*dt*k2[i].dvy;
        }
        const k3=getDerivs(bs);
        for(let i=0;i<n;i++){
          bs[i].x=orig[i].x+dt*k3[i].dx; bs[i].y=orig[i].y+dt*k3[i].dy;
          bs[i].vx=orig[i].vx+dt*k3[i].dvx; bs[i].vy=orig[i].vy+dt*k3[i].dvy;
        }
        const k4=getDerivs(bs);
        for(let i=0;i<n;i++){
          bs[i].x=orig[i].x+(dt/6)*(k1[i].dx+2*k2[i].dx+2*k3[i].dx+k4[i].dx);
          bs[i].y=orig[i].y+(dt/6)*(k1[i].dy+2*k2[i].dy+2*k3[i].dy+k4[i].dy);
          bs[i].vx=orig[i].vx+(dt/6)*(k1[i].dvx+2*k2[i].dvx+2*k3[i].dvx+k4[i].dvx);
          bs[i].vy=orig[i].vy+(dt/6)*(k1[i].dvy+2*k2[i].dvy+2*k3[i].dvy+k4[i].dvy);
        }
      }

      function clamp(val,min,max){ return Math.min(max,Math.max(min,val)); }

      function readParamsFromInputs(){
        const m1=parseFloat(inputs.m1.value)||1.0, m2=parseFloat(inputs.m2.value)||1.0, m3=parseFloat(inputs.m3.value)||1.0;
        const x1=parseFloat(inputs.x1.value)||0, y1=parseFloat(inputs.y1.value)||0;
        const vx1=parseFloat(inputs.vx1.value)||0, vy1=parseFloat(inputs.vy1.value)||0;
        const x2=parseFloat(inputs.x2.value)||0, y2=parseFloat(inputs.y2.value)||0;
        const vx2=parseFloat(inputs.vx2.value)||0, vy2=parseFloat(inputs.vy2.value)||0;
        const x3=parseFloat(inputs.x3.value)||0, y3=parseFloat(inputs.y3.value)||0;
        const vx3=parseFloat(inputs.vx3.value)||0, vy3=parseFloat(inputs.vy3.value)||0;
        return [
          new Body(clamp(m1,0.0001,5000), x1,y1,vx1,vy1,'#ffb347'),
          new Body(clamp(m2,0.0001,5000), x2,y2,vx2,vy2,'#5eb8f7'),
          new Body(clamp(m3,0.0001,5000), x3,y3,vx3,vy3,'#ff6b8a')
        ];
      }

      function applyParameters(){
        bodies = readParamsFromInputs();
        trails = [[],[],[]];
        simTime = 0;
        accumulator = 0;
        for(let i=0;i<20;i++) recordTrails();
        centerView();
      }

      function resetCurrentParams(){
        bodies = readParamsFromInputs();
        trails = [[],[],[]];
        simTime = 0;
        accumulator = 0;
        for(let i=0;i<20;i++) recordTrails();
      }

      function centerView(){
        let cx=0,cy=0; bodies.forEach(b=>{cx+=b.x;cy+=b.y;}); cx/=3;cy/=3;
        targetViewOffsetX=0; targetViewOffsetY=0;
        let maxDist=0;
        bodies.forEach(b=>{const d=Math.hypot(b.x-cx,b.y-cy); if(d>maxDist)maxDist=d;});
        targetViewScale=maxDist>0.1?Math.min(400,Math.max(60,140/maxDist)):160;
        viewScale=targetViewScale; viewOffsetX=targetViewOffsetX; viewOffsetY=targetViewOffsetY;
      }

      function recordTrails(){
        for(let i=0;i<3;i++){
          trails[i].push({x:bodies[i].x, y:bodies[i].y});
          if(trails[i].length>MAX_TRAIL) trails[i].shift();
        }
      }

      // 设置默认参数（“八字辫”解）
      function setDefaultParams() {
        inputs.m1.value = "1.0"; inputs.x1.value = "0.97000436"; inputs.y1.value = "-0.24308753";
        inputs.vx1.value = "0.466203685"; inputs.vy1.value = "0.432365730";
        inputs.m2.value = "1.0"; inputs.x2.value = "-0.97000436"; inputs.y2.value = "0.24308753";
        inputs.vx2.value = "0.466203685"; inputs.vy2.value = "0.432365730";
        inputs.m3.value = "1.0"; inputs.x3.value = "0"; inputs.y3.value = "0";
        inputs.vx3.value = "-0.93240737"; inputs.vy3.value = "-0.86473146";
      }

      // 坐标转换：世界 -> 屏幕
      function worldToScreen(wx, wy) {
        const sx = wx * viewScale + canvas.width / 2 + viewOffsetX;
        const sy = -wy * viewScale + canvas.height / 2 + viewOffsetY;
        return { sx, sy };
      }

      // 坐标转换：屏幕 -> 世界（使用实时 viewScale）
      function screenToWorld(sx, sy) {
        const wx = (sx - canvas.width / 2 - viewOffsetX) / viewScale;
        const wy = -(sy - canvas.height / 2 - viewOffsetY) / viewScale;
        return { wx, wy };
      }

      function drawStars(){
        for(let s of stars){
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle=`rgba(200,210,255,${s.alpha})`; ctx.fill();
        }
      }
      function hexToRgb(hex){
        const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
        return {r,g,b};
      }
      function drawTrails(){
        if(!showTrails) return;
        for(let i=0;i<3;i++){
          const t=trails[i]; if(t.length<2) continue;
          const col=bodies[i].color; const rgb=hexToRgb(col);
          for(let j=1;j<t.length;j++){
            const p0=worldToScreen(t[j-1].x,t[j-1].y), p1=worldToScreen(t[j].x,t[j].y);
            const alpha=0.08+(j/t.length)*0.7;
            ctx.beginPath(); ctx.moveTo(p0.sx,p0.sy); ctx.lineTo(p1.sx,p1.sy);
            ctx.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
            ctx.lineWidth=0.6+(j/t.length)*2.2; ctx.lineCap='round'; ctx.stroke();
          }
        }
      }
      function drawBodyGlow(bx,by,color,radius){
        const rgb=hexToRgb(color);
        const grad=ctx.createRadialGradient(bx,by,radius*0.2,bx,by,radius*2.5);
        grad.addColorStop(0,`rgba(${rgb.r},${rgb.g},${rgb.b},0.9)`);
        grad.addColorStop(0.4,`rgba(${rgb.r},${rgb.g},${rgb.b},0.4)`);
        grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(bx,by,radius*2.5,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
        const inner=ctx.createRadialGradient(bx,by,0,bx,by,radius*0.7);
        inner.addColorStop(0,'white'); inner.addColorStop(0.5,`rgba(${rgb.r},${rgb.g},${rgb.b},0.8)`);
        inner.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(bx,by,radius*0.7,0,Math.PI*2); ctx.fillStyle=inner; ctx.fill();
      }
      function render(){
        const w=canvas.width, h=canvas.height;
        ctx.clearRect(0,0,w,h);
        const bgGrad=ctx.createRadialGradient(w/2,h/2,w*0.1,w/2,h/2,w*0.85);
        bgGrad.addColorStop(0,'#15152a'); bgGrad.addColorStop(1,'#050510');
        ctx.fillStyle=bgGrad; ctx.fillRect(0,0,w,h);
        drawStars(); drawTrails();
        const bodyRadius=Math.max(5,viewScale*0.04);
        for(let b of bodies){ const pos=worldToScreen(b.x,b.y); drawBodyGlow(pos.sx,pos.sy,b.color,bodyRadius); }
        let cmx=0,cmy=0,tm=0;
        bodies.forEach(b=>{cmx+=b.mass*b.x; cmy+=b.mass*b.y; tm+=b.mass;});
        cmx/=tm; cmy/=tm;
        const cm=worldToScreen(cmx,cmy);
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(cm.sx-7,cm.sy); ctx.lineTo(cm.sx+7,cm.sy);
        ctx.moveTo(cm.sx,cm.sy-7); ctx.lineTo(cm.sx,cm.sy+7); ctx.stroke();
      }

      // 动画循环
      let lastTime = performance.now();
      function animate(now) {
        requestAnimationFrame(animate);
        let frameDt = (now - lastTime) / 1000;
        if (frameDt <= 0) frameDt = 0.016;
        if (frameDt > 0.1) frameDt = 0.1;
        lastTime = now;

        // 平滑视图变换
        viewScale += (targetViewScale - viewScale) * 0.1;
        viewOffsetX += (targetViewOffsetX - viewOffsetX) * 0.1;
        viewOffsetY += (targetViewOffsetY - viewOffsetY) * 0.1;

        if (!paused && bodies.length === 3) {
          accumulator += frameDt;
          const microDt = getFixedMicroDt();
          while (accumulator >= microDt) {
            rk4Step(bodies, microDt);
            simTime += microDt;
            accumulator -= microDt;
            if (Math.floor(simTime / BASE_DT) > Math.floor((simTime - microDt) / BASE_DT)) {
              recordTrails();
            }
          }
        }
        render();
      }

      function getFixedMicroDt() {
        return (BASE_DT / SUBSTEPS_PER_BASE) * simSpeed;
      }

      function initStars(){
        stars=[];
        for(let i=0;i<180;i++) stars.push({
          x:Math.random()*canvas.width, y:Math.random()*canvas.height,
          r:Math.random()*1.6+0.3, alpha:Math.random()*0.5+0.3
        });
      }

      // ================= 事件绑定 =================
      // 鼠标滚轮缩放（修复：使用 canvasContainer 作为参照）
      canvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        // 缩放前鼠标指向的世界坐标
        const worldBefore = screenToWorld(mouseX, mouseY);
        
        // 更新目标缩放
        const factor = e.deltaY < 0 ? 1.08 : 0.92;
        targetViewScale = Math.min(600, Math.max(25, targetViewScale * factor));
        
        // 缩放后鼠标指向的世界坐标
        const worldAfter = screenToWorld(mouseX, mouseY);
        
        // 调整偏移，使鼠标指向的世界坐标保持不变
        targetViewOffsetX += (worldAfter.wx - worldBefore.wx) * targetViewScale;
        targetViewOffsetY -= (worldAfter.wy - worldBefore.wy) * targetViewScale;
      }, { passive: false });

      // 鼠标拖拽平移
      canvas.addEventListener('mousedown', function(e) {
        if (e.button === 0 || e.button === 2) {
          isDragging = true;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          dragStartOffX = targetViewOffsetX;
          dragStartOffY = targetViewOffsetY;
          canvas.style.cursor = 'grabbing';
          e.preventDefault();
        }
      });
      window.addEventListener('mousemove', function(e) {
        if (isDragging) {
          const dx = e.clientX - dragStartX;
          const dy = e.clientY - dragStartY;
          targetViewOffsetX = dragStartOffX + dx;
          targetViewOffsetY = dragStartOffY + dy;
        }
      });
      window.addEventListener('mouseup', function() {
        if (isDragging) {
          isDragging = false;
          canvas.style.cursor = 'default';
        }
      });

      // 触摸事件
      canvas.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
          isDragging = true;
          dragStartX = e.touches[0].clientX;
          dragStartY = e.touches[0].clientY;
          dragStartOffX = targetViewOffsetX;
          dragStartOffY = targetViewOffsetY;
        }
      });
      canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) {
          const dx = e.touches[0].clientX - dragStartX;
          const dy = e.touches[0].clientY - dragStartY;
          targetViewOffsetX = dragStartOffX + dx;
          targetViewOffsetY = dragStartOffY + dy;
        }
      }, { passive: false });
      canvas.addEventListener('touchend', function() {
        isDragging = false;
      });

      applyBtn.addEventListener('click', applyParameters);
      pauseBtn.addEventListener('click', ()=>{
        paused = !paused;
        pauseBtn.textContent = paused ? '▶️ 播放' : '⏯️ 暂停';
        if (!paused) {
          accumulator = 0;
          lastTime = performance.now();
        }
      });
      resetBtn.addEventListener('click', resetCurrentParams);
      trailBtn.addEventListener('click', ()=>{
        showTrails = !showTrails;
        trailBtn.style.opacity = showTrails ? '1' : '0.5';
        if (!showTrails) trails = [[],[],[]];
      });

      // 速度滑块
      speedSlider.addEventListener('input', function(e) {
        simSpeed = parseInt(e.target.value);
        speedLabel.textContent = simSpeed + '×';
        accumulator = 0;
        lastTime = performance.now();
      });

      // 键盘事件
      window.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
          return;
        }
        if (e.key === ' ') {
          e.preventDefault();
          paused = !paused;
          pauseBtn.textContent = paused ? '▶️ 播放' : '⏯️ 暂停';
          if (!paused) {
            accumulator = 0;
            lastTime = performance.now();
          }
        }
        if (e.key === 'r' || e.key === 'R') resetBtn.click();
        if (e.key === 't' || e.key === 'T') trailBtn.click();
      });

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const container = document.getElementById('canvas-container');
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(1,0,0,1,0,0);
        ctx.scale(dpr, dpr);
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        initStars();
      }
      window.addEventListener('resize', resize);

      // 初始化
      setDefaultParams();
      applyParameters();
      resize();
      paused = false;
      lastTime = performance.now();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
