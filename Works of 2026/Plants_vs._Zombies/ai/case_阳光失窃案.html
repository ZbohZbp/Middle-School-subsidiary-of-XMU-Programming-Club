<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案件档案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #e0e0ff;
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #6c5ce7;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff80;
            margin-bottom: 10px;
        }
        .header .subtitle {
            color: #a0a0ff;
            font-size: 1.1em;
        }
        .section {
            background: #1a1a3a;
            border: 1px solid #6c5ce740;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            color: #00ffff;
            font-size: 1.3em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #6c5ce740;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .info-item {
            background: #0d0d2a;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #6c5ce7;
        }
        .info-label {
            color: #a0a0ff;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        .info-value {
            color: #e0e0ff;
            font-size: 1.05em;
        }
        .criminal { color: #ff6b6b; font-weight: bold; }
        .suspect-card {
            background: #0d0d2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #6c5ce7;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .suspect-card.is-criminal {
            border-left-color: #ff6b6b;
            background: #1a0d0d;
        }
        .suspect-name {
            font-size: 1.1em;
            font-weight: bold;
            min-width: 80px;
        }
        .suspect-role {
            color: #a0a0ff;
            font-size: 0.85em;
            min-width: 60px;
        }
        .suspect-motive {
            color: #c0c0ff;
            flex: 1;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
        }
        .badge-criminal { background: #ff6b6b40; color: #ff6b6b; }
        .phase-card {
            background: #0d0d2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #6c5ce730;
        }
        .phase-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .phase-title {
            color: #00ffff;
            font-weight: bold;
        }
        .stats {
            display: flex;
            gap: 15px;
        }
        .stat {
            background: #1a1a3a;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        .stat-label { color: #a0a0ff; }
        .stat-value { color: #00ffff; font-weight: bold; }
        .truth-box {
            background: linear-gradient(135deg, #1a0d2a, #0d1a2a);
            border: 1px solid #6c5ce760;
            border-radius: 10px;
            padding: 20px;
            line-height: 1.8;
            font-size: 1.05em;
        }
        .glow { text-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="glow" id="title"></h1>
            <div class="subtitle" id="type-location"></div>
        </div>

        <div class="section">
            <div class="section-title">案件信息</div>
            <div class="info-grid" id="info-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">案件真相</div>
            <div class="truth-box" id="truth"></div>
        </div>

        <div class="section">
            <div class="section-title">嫌疑人</div>
            <div id="suspects"></div>
        </div>

        <div class="section">
            <div class="section-title">审判阶段</div>
            <div id="phases"></div>
        </div>
    </div>

    <script>

        function render() {
            const data = typeof CASE_DATA === 'string' ? JSON.parse(CASE_DATA) : CASE_DATA;

            // 标题
            document.getElementById('title').textContent = data.title || '未知案件';
            document.getElementById('type-location').textContent = 
                `${data.type || '未知类型'} · ${data.location || '未知地点'}`;

            // 信息网格
            const meta = data._meta || {};
            const infoItems = [
                { label: '案件ID', value: data.id || '-' },
                { label: '复杂度', value: '★'.repeat(data.complexity || 1) },
                { label: '审判轮数', value: `${meta.num_rounds || data.phases?.length || '?'} 轮` },
                { label: '真凶', value: meta.real_criminal || '?', isCriminal: true }
            ];
            const grid = document.getElementById('info-grid');
            infoItems.forEach(item => {
                grid.innerHTML += `
                    <div class="info-item">
                        <div class="info-label">${item.label}</div>
                        <div class="info-value ${item.isCriminal ? 'criminal' : ''}">${item.value}</div>
                    </div>`;
            });

            // 真相
            document.getElementById('truth').textContent = data.truth || '真相未知...';

            // 嫌疑人
            const suspectsDiv = document.getElementById('suspects');
            (data.suspects || []).forEach(s => {
                const isCriminal = s.name === meta.real_criminal;
                suspectsDiv.innerHTML += `
                    <div class="suspect-card ${isCriminal ? 'is-criminal' : ''}">
                        <div class="suspect-name">${s.name}</div>
                        <div class="suspect-role">${s.role || '?'}</div>
                        <div class="suspect-motive">${s.motive || '?'}</div>
                        ${isCriminal ? '<span class="badge badge-criminal">真凶</span>' : ''}
                    </div>`;
            });

            // 阶段
            const phasesDiv = document.getElementById('phases');
            (data.phases || []).forEach((phase, i) => {
                const tests = phase.testimonies || [];
                const evs = phase.evidence || [];
                const contra = tests.filter(t => t.is_contradiction).length;
                phasesDiv.innerHTML += `
                    <div class="phase-card">
                        <div class="phase-header">
                            <span class="phase-title">Phase ${i + 1}</span>
                            <div class="stats">
                                <span class="stat"><span class="stat-label">证词</span> <span class="stat-value">${tests.length}</span></span>
                                <span class="stat"><span class="stat-label">矛盾</span> <span class="stat-value">${contra}</span></span>
                                <span class="stat"><span class="stat-label">证据</span> <span class="stat-value">${evs.length}</span></span>
                            </div>
                        </div>
                    </div>`;
            });
        }
