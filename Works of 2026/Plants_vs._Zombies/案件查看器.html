<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案件档案 - 植物法庭</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        body {
            background: #0a0a1a;
            color: #e0e0ff;
            font-family: 'Microsoft YaHei', 'Consolas', monospace;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 上传区域 */
        .upload-zone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: #0a0a1a;
        }
        
        .upload-zone.has-data {
            display: none;
        }
        
        .upload-zone.dragover {
            background: rgba(0, 255, 255, 0.05);
        }
        
        .upload-zone.dragover .upload-box {
            border-color: #00ffff;
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }
        
        .upload-box {
            background: linear-gradient(135deg, #1a1a3a, #0d0d2a);
            border: 2px dashed #6c5ce7;
            border-radius: 20px;
            padding: 80px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 500px;
        }
        
        .upload-box:hover {
            border-color: #00ffff;
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 255, 255, 0.2);
        }
        
        .upload-icon {
            font-size: 100px;
            margin-bottom: 30px;
        }
        
        .upload-text {
            font-size: 1.5em;
            color: #00ffff;
            margin-bottom: 15px;
        }
        
        .upload-hint {
            color: #6c5ce7;
            font-size: 1em;
        }
        
        #file-input { display: none; }
        
        /* 分页容器 */
        .pages-container {
            display: none;
            height: 100vh;
            position: relative;
        }
        
        .pages-container.visible {
            display: block;
        }
        
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding: 20px 40px;
            overflow-y: auto;
        }
        
        .page.active {
            display: flex;
        }
        
        /* 导航栏 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(180deg, #0a0a1a, transparent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 50;
        }
        
        .nav-title {
            color: #00ffff;
            font-size: 1.2em;
            text-shadow: 0 0 10px #00ffff80;
        }
        
        .nav-dots {
            display: flex;
            gap: 15px;
        }
        
        .nav-dot {
            width: 40px;
            height: 4px;
            background: #6c5ce740;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-dot.active {
            background: #00ffff;
            width: 60px;
            box-shadow: 0 0 10px #00ffff80;
        }
        
        .nav-dot:hover {
            background: #6c5ce7;
        }
        
        .nav-actions {
            display: flex;
            gap: 15px;
        }
        
        .nav-btn {
            background: #1a1a3a;
            border: 1px solid #6c5ce7;
            color: #00ffff;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .nav-btn:hover {
            background: #6c5ce7;
            transform: translateY(-2px);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* 页面指示器 */
        .page-indicator {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 50;
        }
        
        .indicator-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6c5ce740;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .indicator-dot::before {
            content: attr(data-label);
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            color: #6c5ce7;
            font-size: 0.85em;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .indicator-dot:hover::before {
            opacity: 1;
            right: 30px;
        }
        
        .indicator-dot.active {
            background: #00ffff;
            box-shadow: 0 0 15px #00ffff80;
            transform: scale(1.3);
        }
        
        .indicator-dot:hover {
            background: #6c5ce7;
        }
        
        /* 页面内容 */
        .page-header {
            text-align: center;
            padding: 80px 0 40px;
        }
        
        .page-header h1 {
            font-size: 2.5em;
            color: #00ffff;
            text-shadow: 0 0 30px #00ffff80;
            margin-bottom: 15px;
        }
        
        .page-header h1:hover {
            animation: glitch 0.5s infinite;
        }
        
        .subtitle {
            color: #a0a0ff;
            font-size: 1.2em;
        }
        
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        
        .section {
            background: linear-gradient(135deg, #1a1a3a, #0d0d2a);
            border: 1px solid #6c5ce740;
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s;
        }
        
        .section:hover {
            border-color: #6c5ce780;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.2);
            transform: translateY(-5px);
        }
        
        .section-title {
            color: #00ffff;
            font-size: 1.5em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .section-title .icon {
            font-size: 1.3em;
        }
        
        /* 信息网格 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .info-item {
            background: #0d0d2a;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #6c5ce7;
            transition: all 0.3s;
        }
        
        .info-item:hover {
            border-left-color: #00ffff;
            transform: translateX(10px);
            box-shadow: -5px 0 20px rgba(0, 255, 255, 0.2);
        }
        
        .info-label {
            color: #6c5ce7;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        
        .info-value {
            color: #e0e0ff;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .criminal { 
            color: #ff6b6b; 
            text-shadow: 0 0 15px #ff6b6b80;
        }
        
        .truth-box {
            background: linear-gradient(135deg, #1a0d2a, #0d1a2a);
            border: 1px solid #6c5ce760;
            border-radius: 15px;
            padding: 30px;
            line-height: 2;
            font-size: 1.15em;
            position: relative;
        }
        
        .truth-box::before {
            content: '"';
            position: absolute;
            top: -30px;
            left: 20px;
            font-size: 100px;
            color: #6c5ce730;
            font-family: serif;
        }
        
        /* 嫌疑人卡片 */
        .suspects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .suspect-card {
            background: linear-gradient(135deg, #0d0d2a, #1a1a3a);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #6c5ce740;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .suspect-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }
        
        .suspect-card:hover::before {
            left: 100%;
        }
        
        .suspect-card:hover {
            border-color: #00ffff;
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.2);
        }
        
        .suspect-card.is-criminal {
            border-color: #ff6b6b80;
            background: linear-gradient(135deg, #1a0d0d, #2a1515);
        }
        
        .suspect-card.is-criminal:hover {
            border-color: #ff6b6b;
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.3);
        }
        
        .suspect-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6c5ce7, #00ffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
        }
        
        .suspect-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #e0e0ff;
            text-align: center;
            margin-bottom: 5px;
        }
        
        .suspect-role {
            color: #6c5ce7;
            text-align: center;
            font-size: 0.95em;
            margin-bottom: 15px;
        }
        
        .suspect-motive {
            color: #a0a0ff;
            line-height: 1.6;
            text-align: center;
        }
        
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .badge-criminal { 
            background: #ff6b6b40; 
            color: #ff6b6b; 
            border: 1px solid #ff6b6b;
            animation: pulse 2s infinite;
        }
        
        /* 阶段卡片 */
        .phases-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .phase-card {
            background: linear-gradient(135deg, #0d0d2a, #1a1a3a);
            border: 2px solid #6c5ce740;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .phase-card:hover {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        
        .phase-card.expanded .phase-content {
            max-height: 2000px;
            padding: 25px;
        }
        
        .phase-card.expanded .expand-icon {
            transform: rotate(180deg);
        }
        
        .phase-header {
            padding: 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }
        
        .phase-header:hover {
            background: rgba(0, 255, 255, 0.05);
        }
        
        .phase-title {
            color: #00ffff;
            font-size: 1.3em;
            font-weight: bold;
        }
        
        .phase-stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            background: #1a1a3a;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95em;
        }
        
        .stat-label { color: #6c5ce7; }
        .stat-value { color: #00ffff; font-weight: bold; margin-left: 8px; }
        
        .expand-icon {
            color: #6c5ce7;
            font-size: 1.5em;
            transition: transform 0.3s;
        }
        
        .phase-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s;
            padding: 0 25px;
            border-top: 1px solid #6c5ce730;
        }
        
        .testimony, .evidence-item {
            background: #0d0d2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #6c5ce750;
            transition: all 0.3s;
        }
        
        .testimony:hover, .evidence-item:hover {
            transform: translateX(5px);
        }
        
        .testimony.contradiction {
            border-left-color: #ff6b6b;
            background: linear-gradient(90deg, #1a0d0d, #0d0d2a);
        }
        
        .testimony-header, .evidence-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .speaker {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .testimony-text, .evidence-desc {
            color: #c0c0ff;
            line-height: 1.7;
            font-size: 1.05em;
        }
        
        .tag {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        
        .tag-contradiction { background: #ff6b6b30; color: #ff6b6b; }
        .tag-evidence { background: #6c5ce730; color: #6c5ce7; }
        
        .judge-comment {
            background: linear-gradient(90deg, #6c5ce720, #00ffff10);
            padding: 20px 25px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #6c5ce7;
            color: #e0e0ff;
            font-style: italic;
            line-height: 1.7;
        }
        

        
        /* 键盘提示 */
        .keyboard-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #6c5ce780;
            font-size: 0.85em;
            z-index: 50;
        }
        
        kbd {
            background: #1a1a3a;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #6c5ce740;
            margin: 0 3px;
        }
        /* ===== 高级法庭档案 UI 重制版 ===== */
        :root {
            --court-bg: #060805;
            --court-panel: rgba(16, 22, 15, 0.78);
            --court-panel-2: rgba(28, 20, 12, 0.72);
            --court-line: rgba(222, 184, 92, 0.24);
            --court-gold: #e8c66d;
            --court-gold-soft: #fff1b8;
            --court-green: #8fd36a;
            --court-red: #d86854;
            --court-text: #f3ead2;
            --court-muted: #a89d82;
            --court-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
        }

        * { scrollbar-width: thin; scrollbar-color: rgba(232,198,109,.55) rgba(255,255,255,.04); }
        ::selection { background: rgba(232,198,109,.28); color: #fff7d6; }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 12%, rgba(143, 211, 106, 0.16), transparent 28%),
                radial-gradient(circle at 82% 16%, rgba(232, 198, 109, 0.14), transparent 30%),
                linear-gradient(135deg, #050704 0%, #0a1008 42%, #08070b 100%);
            color: var(--court-text);
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
            background-size: 52px 52px;
            mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 86%, transparent);
        }

        body::after {
            content: 'COURT ARCHIVE';
            position: fixed;
            right: -3vw;
            bottom: 6vh;
            z-index: 0;
            pointer-events: none;
            color: rgba(232, 198, 109, 0.045);
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(4rem, 11vw, 12rem);
            font-weight: 900;
            letter-spacing: .08em;
            transform: rotate(-8deg);
        }

        .upload-zone { background: transparent; z-index: 100; }
        .upload-zone::before {
            content: '';
            position: absolute;
            inset: 8%;
            border: 1px solid rgba(232,198,109,.15);
            border-radius: 34px;
            box-shadow: inset 0 0 80px rgba(232,198,109,.035);
        }
        .upload-zone.dragover { background: rgba(232, 198, 109, 0.045); }
        .upload-box {
            position: relative;
            background:
                linear-gradient(145deg, rgba(255,255,255,.09), rgba(255,255,255,.025)),
                rgba(10, 16, 9, .78);
            border: 1px dashed rgba(232, 198, 109, .55);
            border-radius: 28px;
            padding: 72px 82px;
            max-width: 560px;
            box-shadow: var(--court-shadow), inset 0 1px 0 rgba(255,255,255,.08);
            backdrop-filter: blur(18px);
        }
        .upload-box:hover, .upload-zone.dragover .upload-box {
            border-color: var(--court-gold);
            transform: translateY(-8px);
            box-shadow: 0 34px 110px rgba(0,0,0,.52), 0 0 0 1px rgba(232,198,109,.22);
        }
        .upload-icon { font-size: 82px; filter: drop-shadow(0 18px 24px rgba(0,0,0,.38)); }
        .upload-text {
            color: var(--court-gold-soft);
            font-family: Georgia, 'Noto Serif SC', serif;
            font-weight: 900;
            letter-spacing: .08em;
        }
        .upload-hint { color: var(--court-muted); }

        .pages-container { position: relative; z-index: 1; }
        .page {
            padding: 84px clamp(28px, 5vw, 72px) 72px;
        }

        .nav-bar {
            height: 64px;
            background: linear-gradient(180deg, rgba(5,8,5,.92), rgba(5,8,5,.54), transparent);
            border-bottom: 1px solid rgba(232,198,109,.12);
            backdrop-filter: blur(14px);
        }
        .nav-title {
            color: var(--court-gold-soft);
            font-family: Georgia, 'Noto Serif SC', serif;
            font-weight: 900;
            letter-spacing: .12em;
            text-shadow: 0 8px 28px rgba(0,0,0,.4);
        }
        .nav-btn {
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(232,198,109,.28);
            color: var(--court-gold-soft);
            border-radius: 999px;
            padding: 9px 22px;
            font-weight: 800;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
        }
        .nav-btn:hover {
            background: linear-gradient(135deg, rgba(232,198,109,.22), rgba(143,211,106,.12));
            border-color: rgba(232,198,109,.62);
            transform: translateY(-2px);
        }
        .nav-dot {
            height: 5px;
            background: rgba(232,198,109,.18);
        }
        .nav-dot.active {
            background: linear-gradient(90deg, var(--court-gold), var(--court-green));
            box-shadow: 0 0 18px rgba(232,198,109,.45);
        }
        .indicator-dot { background: rgba(232,198,109,.2); border: 1px solid rgba(232,198,109,.16); }
        .indicator-dot.active {
            background: var(--court-gold);
            box-shadow: 0 0 22px rgba(232,198,109,.58);
        }
        .indicator-dot::before { color: var(--court-gold-soft); }

        .page-header {
            padding: 26px 0 34px;
            text-align: left;
            width: min(1120px, 100%);
            margin: 0 auto;
        }
        .page-header h1 {
            position: relative;
            display: inline-block;
            color: var(--court-gold-soft);
            font-family: Georgia, 'Noto Serif SC', serif;
            font-size: clamp(2.5rem, 5vw, 5rem);
            line-height: 1.05;
            letter-spacing: .05em;
            text-shadow: 0 18px 48px rgba(0,0,0,.5);
        }
        .page-header h1:hover { animation: none; }
        .page-header h1::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -.55rem;
            width: 72%;
            height: 1px;
            background: linear-gradient(90deg, rgba(232,198,109,.95), rgba(143,211,106,.42), transparent);
            box-shadow: 0 0 18px rgba(232,198,109,.3);
        }
        .subtitle {
            margin-top: 16px;
            color: var(--court-muted);
            font-size: 1rem;
            letter-spacing: .08em;
        }

        .content-area {
            max-width: 1120px;
            gap: 24px;
        }
        .section, .truth-box, .suspect-card, .phase-card, .testimony, .evidence-item, .judge-comment {
            background:
                linear-gradient(145deg, rgba(255,255,255,.075), rgba(255,255,255,.022)),
                var(--court-panel);
            border: 1px solid var(--court-line);
            box-shadow: var(--court-shadow), inset 0 1px 0 rgba(255,255,255,.055);
            backdrop-filter: blur(14px);
        }
        .section {
            border-radius: 24px;
            padding: 28px;
        }
        .section:hover, .suspect-card:hover, .phase-card:hover {
            border-color: rgba(232,198,109,.55);
            transform: translateY(-4px);
            box-shadow: 0 34px 100px rgba(0,0,0,.48), 0 0 0 1px rgba(143,211,106,.06);
        }
        .section-title {
            color: var(--court-gold-soft);
            font-family: Georgia, 'Noto Serif SC', serif;
            font-weight: 900;
            letter-spacing: .06em;
            margin-bottom: 22px;
        }

        .info-grid { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; }
        .info-item {
            background: rgba(0,0,0,.18);
            border: 1px solid rgba(232,198,109,.14);
            border-left: 3px solid var(--court-gold);
            border-radius: 18px;
            padding: 18px 20px;
        }
        .info-item:hover {
            transform: translateY(-3px);
            border-left-color: var(--court-green);
            box-shadow: 0 20px 50px rgba(0,0,0,.28);
        }
        .info-label { color: var(--court-muted); font-size: .78rem; letter-spacing: .16em; font-weight: 800; }
        .info-value { color: var(--court-gold-soft); font-size: 1.25rem; }
        .criminal { color: #ff8d78; text-shadow: 0 0 18px rgba(216,104,84,.38); }

        .truth-box {
            border-radius: 24px;
            padding: 32px 34px;
            line-height: 1.95;
            font-size: 1.08rem;
            color: #efe3c6;
            background:
                radial-gradient(circle at 0% 0%, rgba(232,198,109,.11), transparent 34%),

            if (pageIndex < 0 || pageIndex >= totalPages || pageIndex === currentPage) return;
            
            // 隐藏当前页
            document.getElementById(`page-${currentPage}`).classList.remove('active');
            // 显示新页
            document.getElementById(`page-${pageIndex}`).classList.add('active');
            
            currentPage = pageIndex;
            updateNav();
        }

        function updateNav() {
            // 更新导航点
            navDots.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentPage);
            });
            
            // 更新指示器
            pageIndicator.querySelectorAll('.indicator-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentPage);
            });
            
            // 更新标题
            navTitle.textContent = pageNames[currentPage];
        }

        document.addEventListener('keydown', (e) => {
            if (!pagesContainer.classList.contains('visible')) return;
            
            switch(e.key) {
                case 'ArrowRight':
                case 'd':
                case 'D':
                    goToPage(currentPage + 1);
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    goToPage(currentPage - 1);
                    break;
                case '1':
                    goToPage(0);
                    break;
                case '2':
                    goToPage(1);

                            `).join('')}
                            
                            ${phase.judge_comment ? `
                                <div class="judge-comment">⚖️ 法官: ${phase.judge_comment}</div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // URL 参数加载
        const urlParams = new URLSearchParams(window.location.search);
        const fileUrl = urlParams.get('file');
        if (fileUrl) {
            fetch(fileUrl)
                .then(r => r.json())
                .then(data => {
                    renderCase(data);
                    uploadZone.classList.add('has-data');
                    pagesContainer.classList.add('visible');
                })
                .catch(err => console.error('加载失败:', err));
        }
        
        
        // 自动加载嵌入的数据
        if (typeof EMBEDDED_DATA !== 'undefined') {
            renderCase(EMBEDDED_DATA);
            uploadZone.classList.add('has-data');
            pagesContainer.classList.add('visible');
        }
        
    </script>
</body>
</html>
